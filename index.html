<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="description" content="Lista de compras familiar. Funciona sin internet." />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Compras" />
  <link rel="apple-touch-icon" href="icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />
  <title>Lista de Compras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--border:rgba(255,255,255,0.08);--text:#e6edf3;--muted:#484f58;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px)}
    html,body{height:100%;overflow:hidden;background:var(--bg)}
    body{font-family:'Sora',system-ui,sans-serif;color:var(--text);display:flex;flex-direction:column;height:100dvh;user-select:none}
    .header{flex-shrink:0;padding:calc(var(--safe-t) + 18px) 20px 14px;background:var(--surface);border-bottom:1px solid var(--border)}
    .header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .app-title{font-size:20px;font-weight:700;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px}
    .share-btn{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:7px 12px;font-size:12px;font-family:inherit;cursor:pointer}
    .share-btn:active{opacity:0.7}
    .prog-row{display:flex;align-items:center;gap:10px}
    .prog-bar{flex:1;height:5px;background:var(--surface2);border-radius:99px;overflow:hidden}
    .prog-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:99px;transition:width 0.4s ease}
    .prog-txt{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap}
    .tabs{flex-shrink:0;display:flex;gap:6px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{flex-shrink:0;padding:5px 14px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap}
    .tab.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
    .list-area{flex:1;overflow-y:auto;padding:10px 16px calc(var(--safe-b) + 120px)}
    .sec-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin:16px 0 8px;display:flex;justify-content:space-between;align-items:center}
    .limpiar-btn{font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:600;text-transform:none;letter-spacing:0}
    .items{display:flex;flex-direction:column;gap:6px}
    .item{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;animation:fadeIn 0.18s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
    .item.done{opacity:0.38}
    .item.done .item-name{text-decoration:line-through;color:var(--muted)}
    .chk{width:24px;height:24px;border-radius:50%;flex-shrink:0;border:2px solid var(--muted);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
    .chk.on{background:var(--green);border-color:var(--green)}
    .chk svg{display:none}
    .chk.on svg{display:block}
    .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .item-info{flex:1;min-width:0}
    .item-name{font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .item-sub{font-size:12px;color:var(--muted);margin-top:1px}
    .item-qty{font-size:13px;color:var(--muted);font-family:'DM Mono',monospace}
    .del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1;padding:0 0 0 4px;flex-shrink:0}
    .del:active{color:var(--red)}
    .empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
    .empty-ico{font-size:52px;margin-bottom:12px}
    .empty p{font-size:14px;line-height:1.7}
    .add-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 14px calc(var(--safe-b) + 10px);display:flex;flex-direction:column;gap:8px}
    .add-r1,.add-r2{display:flex;gap:8px}
    input,select{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 12px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color 0.15s}
    input::placeholder{color:var(--muted)}
    input:focus,select:focus{border-color:var(--accent)}
    select option{background:var(--bg)}
    .in-nombre{flex:1;min-width:0}
    .in-qty{width:72px}
    .in-cat{flex:1;min-width:0}
    .add-btn{background:var(--accent);border:none;border-radius:10px;padding:11px 18px;color:#000;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
    .add-btn:active{opacity:0.75}
    .toast{position:fixed;bottom:calc(var(--safe-b) + 145px);left:50%;transform:translateX(-50%) translateY(8px);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:99}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .offline-bar{display:none;background:#7c2d12;text-align:center;font-size:12px;color:#fed7aa;padding:4px;flex-shrink:0}
    body.offline .offline-bar{display:block}
  </style>
</head>
<body>
<div class="offline-bar">⚡ Sin conexión — la app sigue funcionando</div>
<div class="header">
  <div class="header-row">
    <div class="app-title">🛒 Lista de Compras</div>
    <button class="share-btn" id="shareBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Compartir
    </button>
  </div>
  <div class="prog-row">
    <div class="prog-bar"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
    <div class="prog-txt" id="pTxt">0 / 0</div>
  </div>
</div>
<div class="tabs" id="tabs"></div>
<div class="list-area" id="listArea">
  <div class="empty" id="emptyEl"><div class="empty-ico">🛒</div><p>Tu lista está vacía.<br/>Agrega el primer producto abajo.</p></div>
  <div id="slPend" class="sec-label" style="display:none">Por comprar</div>
  <div class="items" id="pendItems"></div>
  <div id="slDone" class="sec-label" style="display:none">Comprados <button class="limpiar-btn" id="limpiarBtn">Limpiar ✕</button></div>
  <div class="items" id="doneItems"></div>
</div>
<div class="add-bar">
  <div class="add-r1">
    <input class="in-nombre" id="iNombre" type="text" placeholder="Producto (ej: Leche, arroz…)" autocomplete="off" autocorrect="off" />
    <input class="in-qty" id="iQty" type="text" placeholder="Cant." autocomplete="off" />
  </div>
  <div class="add-r2">
    <select class="in-cat" id="iCat">
      <option value="Frutas y verduras">🥦 Frutas y verduras</option>
      <option value="Lácteos">🥛 Lácteos</option>
      <option value="Carnes">🥩 Carnes</option>
      <option value="Panadería">🍞 Panadería</option>
      <option value="Bebidas">🧃 Bebidas</option>
      <option value="Limpieza">🧹 Limpieza</option>
      <option value="Cuidado personal">🧴 Cuidado personal</option>
      <option value="Otros">📦 Otros</option>
    </select>
    <button class="add-btn" id="addBtn">+ Agregar</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const CAT_COLOR={'Frutas y verduras':'#3fb950','Lácteos':'#58a6ff','Carnes':'#f85149','Panadería':'#d29922','Bebidas':'#bc8cff','Limpieza':'#39d353','Cuidado personal':'#ff7b72','Otros':'#8b949e'};
let items=[];let filtro='Todos';
function cargar(){try{items=JSON.parse(localStorage.getItem('compras_v4')||'[]');}catch{items=[];}}
function guardar(){localStorage.setItem('compras_v4',JSON.stringify(items));}
function render(){
  const vis=filtro==='Todos'?items:items.filter(i=>i.cat===filtro);
  const pend=vis.filter(i=>!i.done);const done=vis.filter(i=>i.done);
  const total=items.length;const hechos=items.filter(i=>i.done).length;
  document.getElementById('pFill').style.width=total?`${(hechos/total)*100}%`:'0%';
  document.getElementById('pTxt').textContent=`${hechos} / ${total}`;
  const cats=[...new Set(items.map(i=>i.cat))];
  const tabsEl=document.getElementById('tabs');tabsEl.innerHTML='';
  ['Todos',...cats].forEach(c=>{const b=document.createElement('button');b.className='tab'+(filtro===c?' active':'');b.textContent=c;b.onclick=()=>{filtro=c;render();};tabsEl.appendChild(b);});
  document.getElementById('emptyEl').style.display=vis.length?'none':'block';
  document.getElementById('slPend').style.display=pend.length?'flex':'none';
  document.getElementById('slDone').style.display=done.length?'flex':'none';
  renderItems(document.getElementById('pendItems'),pend);
  renderItems(document.getElementById('doneItems'),done);
}
function renderItems(el,arr){
  el.innerHTML='';
  arr.forEach(item=>{
    const d=document.createElement('div');d.className='item'+(item.done?' done':'');
    const color=CAT_COLOR[item.cat]||'#8b949e';
    d.innerHTML=`<button class="chk ${item.done?'on':''}" data-id="${item.id}"><svg width="12" height="9" viewBox="0 0 12 9" fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4.5 4.5,8 11,1"/></svg></button><div class="dot" style="background:${color}"></div><div class="item-info"><div class="item-name">${esc(item.nombre)}</div><div class="item-sub">${esc(item.cat)}</div></div>${item.qty?`<span class="item-qty">${esc(item.qty)}</span>`:''}<button class="del" data-id="${item.id}">×</button>`;
    el.appendChild(d);
  });
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.getElementById('listArea').addEventListener('click',e=>{
  const chk=e.target.closest('.chk');const del=e.target.closest('.del');
  if(chk){const it=items.find(i=>i.id==chk.dataset.id);if(it){it.done=!it.done;guardar();render();}}
  if(del){items=items.filter(i=>i.id!=del.dataset.id);guardar();render();}
});
function agregar(){
  const nombre=document.getElementById('iNombre').value.trim();
  if(!nombre){document.getElementById('iNombre').focus();return;}
  const qty=document.getElementById('iQty').value.trim();
  const cat=document.getElementById('iCat').value;
  items.push({id:Date.now(),nombre,qty,cat,done:false});
  guardar();render();
  document.getElementById('iNombre').value='';document.getElementById('iQty').value='';
  document.getElementById('iNombre').focus();
}
document.getElementById('limpiarBtn').onclick=()=>{items=items.filter(i=>!i.done);guardar();render();};
document.getElementById('addBtn').onclick=agregar;
document.getElementById('iNombre').addEventListener('keydown',e=>{if(e.key==='Enter')agregar();});
document.getElementById('iQty').addEventListener('keydown',e=>{if(e.key==='Enter')agregar();});
document.getElementById('shareBtn').onclick=async()=>{
  const url=window.location.href;
  if(navigator.share){try{await navigator.share({title:'Lista de Compras',text:'¡Únete a nuestra lista familiar!',url});}catch{}}
  else{try{await navigator.clipboard.writeText(url);showToast('✅ Link copiado');}catch{showToast('URL: '+url);}}
};
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800);}
const checkOnline=()=>document.body.classList.toggle('offline',!navigator.onLine);
window.addEventListener('online',checkOnline);window.addEventListener('offline',checkOnline);checkOnline();
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();setTimeout(()=>showToast('💡 Instala la app desde el menú del navegador'),2500);});
cargar();render();
</script>
</body>
</html>
